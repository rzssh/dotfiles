onboarding = false
new_cwd = "~/projects"
prompt_new_tab_name = false

[ui]
show_agent_labels_on_pane_borders = true
agent_panel_scope = "current"

[ui.sidebar.spaces]
rows = [
  ["state_icon", "workspace"],
  ["$vcs_ref", "git_status"],
]

[ui.sidebar.agents]
rows = [
  ["state_icon", "workspace", "agent"],
  ["tab"],
]

[ui.sound]
enabled = false

[ui.toast]
delivery = "herdr"

[keys]
focus_pane_left  = ""
focus_pane_right = ""
focus_pane_up    = ""
focus_pane_down  = ""
swap_pane_left   = "alt+shift+left"
swap_pane_right  = "alt+shift+right"
swap_pane_up     = "alt+shift+up"
swap_pane_down   = "alt+shift+down"
next_agent         = "alt+]"
previous_agent     = "alt+["
focus_agent        = "ctrl+1..9"
switch_tab         = "alt+1..9"
zoom               = ["prefix+z", "alt+z"]
previous_workspace = "alt+shift+["
next_workspace     = "alt+shift+]"
switch_workspace   = "alt+shift+1..9"

[[keys.command]]
key = "prefix+1"
type = "shell"
command = "herdr-move-tab-workspace 1"
description = "move tab to workspace 1"

[[keys.command]]
key = "prefix+2"
type = "shell"
command = "herdr-move-tab-workspace 2"
description = "move tab to workspace 2"

[[keys.command]]
key = "prefix+3"
type = "shell"
command = "herdr-move-tab-workspace 3"
description = "move tab to workspace 3"

[[keys.command]]
key = "prefix+4"
type = "shell"
command = "herdr-move-tab-workspace 4"
description = "move tab to workspace 4"

[[keys.command]]
key = "prefix+5"
type = "shell"
command = "herdr-move-tab-workspace 5"
description = "move tab to workspace 5"

[[keys.command]]
key = "prefix+6"
type = "shell"
command = "herdr-move-tab-workspace 6"
description = "move tab to workspace 6"

[[keys.command]]
key = "prefix+7"
type = "shell"
command = "herdr-move-tab-workspace 7"
description = "move tab to workspace 7"

[[keys.command]]
key = "prefix+8"
type = "shell"
command = "herdr-move-tab-workspace 8"
description = "move tab to workspace 8"

[[keys.command]]
key = "prefix+9"
type = "shell"
command = "herdr-move-tab-workspace 9"
description = "move tab to workspace 9"

[[keys.command]]
key = "alt+left"
type = "plugin_action"
command = "herdr-nvim.nav-left"
description = "navigate left"

[[keys.command]]
key = "alt+right"
type = "plugin_action"
command = "herdr-nvim.nav-right"
description = "navigate right"

[[keys.command]]
key = "alt+up"
type = "plugin_action"
command = "herdr-nvim.nav-up"
description = "navigate up"

[[keys.command]]
key = "alt+down"
type = "plugin_action"
command = "herdr-nvim.nav-down"
description = "navigate down"

[[keys.command]]
key = "prefix+alt+r"
type = "popup"
command = 'printf "Agent name: "; IFS= read -r name; [ -z "$name" ] || "$HERDR_BIN_PATH" agent rename "$HERDR_ACTIVE_PANE_ID" "$name"'
description = "rename agent"
width = 48
height = 3

[[keys.command]]
key = "prefix+alt+p"
type = "popup"
command = "ai-workspace-picker"
description = "new profiled workspace"
width = "60%"
height = 12

[[keys.command]]
key = "prefix+t"
type = "popup"
command = "tuxedo"
description = "tasks"
width = "90%"
height = "85%"

[[keys.command]]
key = "prefix+a"
type = "shell"
command = "herdr-jj-workspace workspace"
description = "new jj workspace"

[[keys.command]]
key = "prefix+shift+a"
type = "shell"
command = "herdr-jj-workspace tab"
description = "new jj workspace tab"

[[keys.command]]
key = "prefix+d"
type = "shell"
command = "herdr-jj-workspace remove"
description = "remove jj workspace"

[advanced]
scrollback_limit_bytes = 200000000

[experimental]
kitty_graphics = true

[theme]
name = "terminal"
auto_switch = false

[theme.custom]
accent = "#ffacea"
panel_bg = "reset"
surface0 = "reset"
surface1 = "#271c24"
surface_dim = "#1a1018"
overlay0 = "#9d8c96"
overlay1 = "#d4c1cc"
text = "reset"
subtext0 = "#f1dde8"
mauve = "#feb2c3"
green = "#94da00"
yellow = "#ffba48"
red = "#ffb1c0"
blue = "#bcc2ff"
teal = "#00daf5"
peach = "#ecb8cf"
