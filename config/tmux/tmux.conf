set -g  base-index        1
set -g  detach-on-destroy off
set -g  escape-time       0
set -g  history-limit     1000000
set -g  mouse             on
set -g  renumber-windows  on
set -g  set-clipboard     on
set -g  status-interval   2
set -g  status-position   bottom
set -g  status-justify    absolute-centre
set -g  focus-events      on
set -g  allow-passthrough on

set-option -ga update-environment ' HYPRLAND_INSTANCE_SIGNATURE'
set -g default-terminal "tmux-256color"
set -g default-shell "$SHELL"
set -g terminal-overrides ",xterm-256color:RGB"

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

bind c new-window -c '#{pane_current_path}'
bind Space run-shell "tmux-layout-picker"
bind \; new-window -c "#{pane_current_path}" -n "♉" "btop 2> /dev/null"
bind g new-window -c "#{pane_current_path}" -n "🌳" "lazygit 2> /dev/null"
bind d new-window -c "#{pane_current_path}" -n "🗃️" "dblab --config 2> /dev/null"
bind b new-window -c "#{pane_current_path}" -n "🐳" "lazydocker 2> /dev/null"
bind y new-window -c "#{pane_current_path}" -n "📁" "fish -c 'yazi_create_tmux'"

is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?(g?(view|n?vim?x?)(diff)?|fzf)$'"

bind -n M-Left  if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n M-Down  if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n M-Up    if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n M-Right if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

bind | split-window -c '#{pane_current_path}' -h
bind ^ split-window -c '#{pane_current_path}' -v

unbind -T prefix Up
unbind -T prefix Down
unbind -T prefix Left
unbind -T prefix Right

unbind -T prefix M-Up
unbind -T prefix M-Down
unbind -T prefix M-Left
unbind -T prefix M-Right

bind -r C-Left  resize-pane -L 5
bind -r C-Down  resize-pane -D 5
bind -r C-Up    resize-pane -U 5
bind -r C-Right resize-pane -R 5

bind n new-session
bind o previous-window
bind u next-window
unbind z
unbind r
bind r source-file ~/.config/tmux/tmux.conf

bind-key x kill-pane

unbind m
bind -r f resize-pane -Z

bind ! break-pane
bind @ choose-window 'join-pane -v -t "%%"'
bind B command-prompt -p "break window to new session:" "new-session -d -s '%1' ; move-window -t '%1:' ; kill-window -t '%1:^' ; switch-client -t '%1'"
bind M choose-tree -s "move-window -t '%%:'"

set-window-option -g mode-keys vi

bind v copy-mode
bind -T copy-mode-vi 'v' send -X begin-selection
bind -T copy-mode-vi 'y' send -X copy-selection-no-clear \; display-message " ✓ copied"
unbind -T copy-mode-vi MouseDragEnd1Pane
bind -T root MouseDrag1Pane if -F "#{pane_in_mode}" { send -M } { copy-mode -M }

unbind t
bind-key T clock-mode
bind-key t run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 55%,50% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)'
)\""
bind -N "last-session (via sesh) " Tab run-shell "sesh last"


set -g status              on
set -g status-left-length  100
set -g status-right-length 100

# vim-tpipeline
set -g status-left         '#(cat #{socket_path}-\#{session_id}-vimbridge)'
set -g status-right        '#(cat #{socket_path}-\#{session_id}-vimbridge-R)'

source-file -q ~/.cache/matugen/tmux-colors.conf

bind e display-popup -E -T "#[align=centre] Environment Variables " -w 80% -h 70% \
  "fish -c 'set selected (env | sort | fzf); and test -n \$selected; and printf \"%s\" \$selected | string split -m1 -f2 = | tr -d \"\\n\" | wl-copy'"

set -g status-style 'bg=default'
set -g popup-style 'bg=default'
set -g popup-border-style 'bg=default'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '1'

bind O swap-window -t -1\; select-window -t -1
bind U swap-window -t +1\; select-window -t +1

# nav
bind -n M-Left  if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n M-Down  if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n M-Up    if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n M-Right if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

bind | split-window -c '#{pane_current_path}' -h
bind ^ split-window -c '#{pane_current_path}' -v

unbind -T prefix Up
unbind -T prefix Down
unbind -T prefix Left
unbind -T prefix Right

unbind -T prefix M-Up
unbind -T prefix M-Down
unbind -T prefix M-Left
unbind -T prefix M-Right

bind -r C-Left  resize-pane -L 5
bind -r C-Down  resize-pane -D 5
bind -r C-Up    resize-pane -U 5
bind -r C-Right resize-pane -R 5

run-shell ~/.local/share/tmux-plugins/resurrect/resurrect.tmux
run-shell -b ~/.local/share/tmux-plugins/continuum/continuum.tmux
