set -g pane-border-style "fg={{colors.outline.default.hex}}"
set -g pane-active-border-style "fg={{colors.primary.default.hex}}"
set -g pane-border-lines single
set -g pane-border-indicators off
set -g message-style "fg={{colors.on_surface.default.hex}},bg=default"
set -g window-status-format "#[fg={{colors.on_surface_variant.default.hex}},bg={{colors.surface_container_highest.default.hex}}] #I #[fg={{colors.on_surface.default.hex}},bg={{colors.surface_container.default.hex}}] #{b:pane_current_path} "
set -g window-status-current-format "#[fg={{colors.background.default.hex}},bg={{colors.primary.default.hex}}] #I #[fg={{colors.on_surface.default.hex}},bg={{colors.surface_container.default.hex}}] #{b:pane_current_path} "
set-window-option -g window-status-separator " "
