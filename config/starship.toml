# Switch between "catppuccin_mocha" or "matugen" (terminal colors set by matugen)
palette = "matugen"

# Minimal single-line format for small tmux panes
format = "$directory$git_branch$git_status$nodejs$bun$rust$golang$python$lua$zig$time\n$character"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

# Matugen palette - uses terminal colors set by matugen/DMS
[palettes.matugen]
red = "red"
green = "green"
blue = "blue"
yellow = "yellow"
purple = "purple"
cyan = "cyan"
white = "white"
black = "black"
# Map catppuccin names to terminal colors
mauve = "magenta"
peach = "yellow"
teal = "cyan"
sky = "bright-cyan"
sapphire = "bright-blue"
lavender = "bright-magenta"
text = "white"
subtext1 = "bright-white"
subtext0 = "bright-black"
overlay2 = "bright-black"
overlay1 = "bright-black"
overlay0 = "bright-black"
surface2 = "bright-black"
surface1 = "black"
surface0 = "black"
base = "black"
mantle = "black"
crust = "black"

[character]
success_symbol = "[вқҜ](green)"
error_symbol = "[вқҜ](red)"
vimcmd_symbol = "[вқ®](subtext1)"

[directory]
style = "bold blue"
format = "[$path]($style) "
truncation_length = 1
# truncation_symbol = "вҖҰ/"
truncation_symbol = "/"

[directory.substitutions]
"Documents" = " "
"Downloads" = "пҖҷ "
"dotfiles" = "оҳ• "
"nvim" = "пҚҜ "
# "projects" = "п„ө "
# "other" = "п„•  пҒј оҲҸ пӮӣ п„  оқҺ оһЁ оҳ§ оҳқ п„» п„ј пҮҖ пҲі п„Ў пҶҮ оҳ• пӮ… п„ө пҖ… пҖ„ пҶ… пғӮ пҶ» п’җ вҡЎпёҸ рҹҢҷ пҖҢ п…Ҡ п„і пҗә пүү пҖ® пҖӮ пҖҒ пҖҫ"

[git_branch]
symbol = "пҗҳ"
style = "purple"
format = '[$symbol $branch]($style) '

[git_status]
style = "red"
format = '[$all_status$ahead_behind]($style) '

[nodejs]
symbol = "оңҳ"
format = '[$symbol ($version)]($style) '
disabled = false
detect_extensions = ["js", "mjs", "cjs", "jsx", "tsx", "ts"]

[bun]
symbol = 'оқҜ'
format = '[$symbol ($version)]($style) '
disabled = false

[rust]
symbol = "оһЁ"
format = '[$symbol ($version)]($style) '
disabled = false

[golang]
symbol = "оҳ§"
format = '[$symbol ($version)]($style) '
disabled = false

[python]
symbol = "оҳҶ"
format = '[$symbol ($version)]($style) '
disabled = false

[lua]
symbol = "оҳ "
format = '[$symbol ($version)]($style) '
detect_folders = ["lua", "nvim"]
disabled = false

[zig]
symbol = "пғ§"
format = '[$symbol ($version)]($style) '
disabled = false

[time]
disabled = true
time_format = "%R" # Hour:Minute Format
style = "bg:base"
format = '[[ пҗә $time ](fg:white)]($style)'
